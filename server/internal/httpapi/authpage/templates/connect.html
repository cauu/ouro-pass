<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Ouro Pass — Connect Wallet</title>
<style>
  :root { color-scheme: light dark; }
  body { font-family: system-ui, -apple-system, sans-serif; max-width: 28rem; margin: 4rem auto; padding: 0 1rem; line-height: 1.5; }
  h1 { font-size: 1.4rem; margin-bottom: .25rem; }
  .muted { color: #6b7280; font-size: .9rem; }
  #op-wallets { display: flex; flex-direction: column; gap: .5rem; margin: 1.5rem 0; }
  button.wallet { display: flex; align-items: center; gap: .6rem; padding: .7rem 1rem; font-size: 1rem; border: 1px solid #d1d5db; border-radius: .6rem; background: transparent; color: inherit; cursor: pointer; }
  button.wallet:hover:not([disabled]) { border-color: #6366f1; }
  button.wallet[disabled] { opacity: .5; cursor: default; }
  #op-status { min-height: 1.4rem; margin-top: 1rem; }
  #op-status.err { color: #dc2626; }
</style>
</head>
<body>
<h1>Connect your Cardano wallet</h1>
<p class="muted">Authorize <strong>{{.Aud}}</strong> with your staking identity. Your keys never leave your wallet.</p>
<div id="op-app"
  data-mode="authorize"
  data-purpose="issue"
  data-challenge-url="/api/auth/challenge"
  data-submit-url="/api/connect/authorize"
  data-client-id="{{.ClientID}}"
  data-redirect-uri="{{.RedirectURI}}"
  data-state="{{.State}}"
  data-aud="{{.Aud}}"
  data-scope="{{.Scope}}"
  data-code-challenge="{{.CodeChallenge}}"
  data-device-pubkey="{{.DevicePubkey}}"></div>
<div id="op-wallets"></div>
<div id="op-status"></div>
<p class="muted">Select your wallet, then approve the signature request. You will be redirected back to the app.</p>
<script src="/assets/ouropass-auth.js"></script>
</body>
</html>
